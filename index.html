<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال مهم</title>
    <style>
        /* تصميم الصفحة باللون الأسود بالكامل والكلام بالأبيض */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; /* إخفاء وميض الضغط الأزرق في الموبايل */
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
            align-items: center;
        }

        /* تصميم الأزرار: خلفية بيضاء وكتابة سوداء */
        .btn {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            user-select: none;
        }

        /* زر "لا" يبدأ في مكان محدد بجانب زر أيوة */
        #no-btn {
            position: absolute;
            left: calc(50% + 10px);
            transition: transform 0.1s ease;
        }

        #yes-btn {
            position: absolute;
            right: calc(50% + 10px);
        }

        /* رسالة النجاح */
        .result {
            display: none;
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            animation: popUp 0.5s ease-out forwards;
        }

        @keyframes popUp {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="quiz-box">
        <h1 id="question">بتحبيني؟</h1>
        <div class="buttons-container" id="btn-wrapper">
            <button class="btn" id="yes-btn" onclick="showSuccess()">أيوة</button>
            <button class="btn" id="no-btn">لا</button>
        </div>
    </div>

    <div class="result" id="result-box">
        جدعة 🤍
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const quizBox = document.getElementById('quiz-box');
        const resultBox = document.getElementById('result-box');

        // دالة تحريك زر "لا" إلى مكان عشوائي تماماً عند الضغط
        function moveNoButton(e) {
            // منع السلوك الافتراضي للحدث لمنع أي تداخل على الموبايل
            if(e) e.preventDefault();

            // حساب أبعاد الشاشة المتاحة للحركة مع ترك مسافة أمان من الحواف
            const padding = 60;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // توليد إحداثيات عشوائية داخل حدود الشاشة
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            // نقل الزر للمكان العشوائي الجديد
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        /* تم قصر الحركة على حدث الضغط الفعلي فقط (Click و Touchstart) */
        noBtn.addEventListener('click', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton);

        // دالة إظهار كلمة "جدعة" باللون الأبيض مع قلب أبيض أنيق
        function showSuccess() {
            quizBox.style.display = 'none';
            resultBox.style.display = 'block';
        }
    </script>

</body>
</html>
